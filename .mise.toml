[tools]
# modmux is installed via GitHub Releases binary or deno

[settings]
# See: https://github.com/modmux/modmux/releases

[tasks.install]
description = "Install modmux globally from source (cross-platform)"
run = "deno task install"

[tasks.start]
description = "Start the modmux service"
run = "modmux start"

[tasks.stop]
description = "Stop the modmux service"
run = "modmux stop"

[tasks.restart]
description = "Restart the modmux service"
run = "modmux restart"

[tasks.status]
description = "Show modmux service status"
run = "modmux status"

[tasks.dev]
description = "Run modmux from source (development)"
run = "deno task dev"
